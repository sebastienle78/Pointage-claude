<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mon Relevé d'Heures</title> 
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424; --border: #2e2e2e; --accent: #d4f53c; --accent2: #ff6b35; --text: #f0f0f0; --muted: #888; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; max-width: 480px; margin: 0 auto; padding-bottom: 100px; }
  .header { background: var(--surface); padding: 20px; border-bottom: 1px solid var(--border); }
  .month-nav { display: flex; align-items: center; justify-content: space-between; background: var(--surface2); padding: 10px; border-radius: 12px; margin-top: 10px; }
  .month-btn { background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; }
  .month-label { font-family: 'Syne'; font-weight: 700; }
  .view { display: none; padding: 20px; }
  .view.active { display: block; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 15px; }
  #dateSelector { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--accent); font-family: 'Syne'; font-size: 16px; padding: 12px; margin-bottom: 20px; text-align: center; outline: none; }
  .time-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
  .time-input { display: flex; flex-direction: column; gap: 5px; font-size: 10px; color: var(--muted); }
  .time-input input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: #fff; padding: 8px; font-family: 'DM Mono'; text-align: center; }
  .btn-save { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--accent); color: #000; font-family: 'Syne'; font-weight: 800; cursor: pointer; }
  
  /* TABLEAU PRO POUR L'IMPRESSION */
  #printArea { display: none; background: white; color: black; padding: 20px; }
  table { width: 100%; border-collapse: collapse; margin-top: 20px; color: black; }
  th, td { border: 1px solid #ddd; padding: 8px; text-align: center; font-size: 12px; }
  th { background-color: #f2f2f2; font-family: 'Syne'; }
  .print-header { text-align: center; margin-bottom: 20px; }

  @media print {
    body * { display: none; }
    #printArea, #printArea * { display: block; }
    table, th, td { display: table-cell !important; }
    table { display: table !important; }
  }
  
  .nav { position: fixed; bottom: 0; width: 100%; max-width: 480px; background: var(--surface); padding: 15px; display: flex; justify-content: space-around; border-top: 1px solid var(--border); }
  .nav-item { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; }
  .nav-item.active { color: var(--accent); }
</style>
</head>
<body>

<div id="printArea">
  <div class="print-header">
    <h1 id="printMonthTitle">Relevé d'Heures</h1>
    <p>Document généré le <span id="printToday"></span></p>
  </div>
  <table id="tablePointage">
    <thead>
      <tr>
        <th>Jour</th>
        <th>Statut</th>
        <th>Total</th>
        <th>Heures Supp.</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div style="margin-top: 20px; font-weight: bold; text-align: right;" id="printTotals"></div>
</div>

<div class="header">
  <div style="font-family: 'Syne'; font-weight: 800; font-size: 22px;">Pointage<span>.</span></div>
  <div class="month-nav">
    <button onclick="changeMonth(-1)" class="month-btn">‹</button>
    <div id="monthLabel" class="month-label"></div>
    <button onclick="changeMonth(1)" class="month-btn">›</button>
  </div>
</div>

<div class="view active" id="view-saisie">
  <div class="card">
    <input type="date" id="dateSelector">
    <div class="time-grid">
      <div class="time-input"><label>ARRIVÉE</label><input type="time" id="t1" value="08:00"></div>
      <div class="time-input"><label>PAUSE</label><input type="time" id="tp" value="01:00"></div>
      <div class="time-input"><label>DÉPART</label><input type="time" id="t2" value="17:00"></div>
    </div>
    <button class="btn-save" onclick="save()">💾 Enregistrer la journée</button>
  </div>
  <button class="btn-save" style="background:var(--surface2); color:white;" onclick="preparePrint()">🖨️ Générer le tableau PDF</button>
</div>

<div class="view" id="view-liste" id="listContent">
    <p style="text-align: center; color: var(--muted);">Les données s'affichent dans le tableau d'impression.</p>
</div>

<div class="nav">
  <button onclick="showView('saisie')" id="nav-saisie" class="nav-item active">✏️ Saisie</button>
  <button onclick="showView('liste')" id="nav-liste" class="nav-item">📋 Aperçu</button>
</div>

<script>
let curDate = new Date();

function changeMonth(v) {
  curDate.setMonth(curDate.getMonth() + v);
  update();
}

function update() {
  const m = curDate.toLocaleString('fr-fr', {month:'long', year:'numeric'});
  document.getElementById('monthLabel').textContent = m.charAt(0).toUpperCase() + m.slice(1);
}

function save() {
  const d = new Date(document.getElementById('dateSelector').value);
  const key = 'pts_'+d.getFullYear()+'_'+d.getMonth();
  const data = JSON.parse(localStorage.getItem(key) || '{}');
  const t1 = document.getElementById('t1').value.split(':').map(Number);
  const t2 = document.getElementById('t2').value.split(':').map(Number);
  const tp = document.getElementById('tp').value.split(':').map(Number);
  const total = (t2[0]*60+t2[1]) - (t1[0]*60+t1[1]) - (tp[0]*60+tp[1]);
  data[d.getDate()] = { total, supp: Math.max(0, total-480), status: 'Travail' };
  localStorage.setItem(key, JSON.stringify(data));
  alert('Journée enregistrée !');
}

function preparePrint() {
  const key = 'pts_'+curDate.getFullYear()+'_'+curDate.getMonth();
  const data = JSON.parse(localStorage.getItem(key) || '{}');
  const tbody = document.getElementById('tableBody');
  const m = curDate.toLocaleString('fr-fr', {month:'long', year:'numeric'});
  
  document.getElementById('printMonthTitle').textContent = "Relevé d'Heures - " + m;
  document.getElementById('printToday').textContent = new Date().toLocaleDateString();
  
  tbody.innerHTML = "";
  let totalMins = 0;
  let totalSupp = 0;

  Object.keys(data).sort((a,b)=>a-b).forEach(day => {
    const e = data[day];
    totalMins += e.total;
    totalSupp += e.supp;
    const row = `<tr><td>${day}</td><td>${e.status}</td><td>${Math.floor(e.total/60)}h${String(e.total%60).padStart(2,'0')}</td><td>${Math.floor(e.supp/60)}h${String(e.supp%60).padStart(2,'0')}</td></tr>`;
    tbody.innerHTML += row;
  });

  document.getElementById('printTotals').innerHTML = `Total mois : ${Math.floor(totalMins/60)}h${String(totalMins%60).padStart(2,'0')} | Dont Supp : ${Math.floor(totalSupp/60)}h${String(totalSupp%60).padStart(2,'0')}`;
  
  window.print();
}

function showView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
}

document.getElementById('dateSelector').valueAsDate = new Date();
update();
</script>
</body>
</html>
